services:

  # =========================================================
  # DJANGO
  # =========================================================
  web:
    build: .

    command: python manage.py runserver 0.0.0.0:8000
    
    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_started

      minio:
        condition: service_healthy

  # =========================================================
  # POSTGRES
  # =========================================================
  db:
    image: postgres:16-alpine

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================================
  # REDIS
  # =========================================================
  redis:
    image: redis:7-alpine

    restart: unless-stopped

    ports:
      - "6379:6379"

  # =========================================================
  # CELERY WORKER
  # =========================================================
  celery:
    build: .

    command: celery -A dizimus.config worker -l info
    working_dir: /app
    volumes:
      - .:/app

    env_file:
      - .env
    environment:
      - PYTHONPATH=/app  
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_started

      minio:
        condition: service_healthy

  # =========================================================
  # CELERY BEAT
  # =========================================================
  celery-beat:
    build: .

    command: celery -A dizimus.config beat -l info
    working_dir: /app
    volumes:
      - .:/app

    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_started

  # =========================================================
  # MINIO
  # =========================================================
  minio:
    image: minio/minio:latest

    command: server /data --console-address ":9001"

    restart: unless-stopped

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - minio_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:9000/minio/health/live"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================
  # CREATE BUCKETS
  # =========================================================
  createbuckets:
    image: minio/mc:latest

    depends_on:
      minio:
        condition: service_healthy

    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET_MEDIA};
        mc mb --ignore-existing local/${MINIO_BUCKET_STATIC};
        mc mb --ignore-existing local/${MINIO_BUCKET_PRIVATE};
        mc anonymous set download local/${MINIO_BUCKET_STATIC};
        mc anonymous set download local/${MINIO_BUCKET_MEDIA};
        exit 0;
      "

# =========================================================
# VOLUMES
# =========================================================
volumes:
  postgres_data:
  minio_data:
  